<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box {
            border: 1px solid black;
            width: 100px;
            /* 내용물이 튀어나오지 않도록 min 값을 지정 */
            min-height: 100px;
            padding: 10px;
        }
        .btn {
            border: 1px solid black;
            background-color: white;
            padding: 5px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>안녕?</h1>
        <button class="btn">다크 모드</button>
    </div>
    <script src="app.js"></script>
</body>
</html>
